<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="20" fill="url(#gradient)"/>
  
  <!-- Left frame (representing first image) -->
  <rect x="15" y="25" width="35" height="50" rx="3" fill="none" stroke="white" stroke-width="3.5" opacity="0.9"/>
  
  <!-- Right frame (representing second image) -->
  <rect x="50" y="25" width="35" height="50" rx="3" fill="none" stroke="white" stroke-width="3.5"/>
  
  <!-- Checkmark on right frame -->
  <path d="M 60 42 L 67 50 L 78 35" fill="none" stroke="#10b981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
